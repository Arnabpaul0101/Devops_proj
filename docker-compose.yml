version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bloodbank_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bloodbank
      MYSQL_USER: bbuser
      MYSQL_PASSWORD: bbpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${REGISTRY:-local}/bloodbank-app:${IMAGE_TAG:-latest}
    container_name: bloodbank_app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DB_HOST: db
      DB_USER: bbuser
      DB_PASSWORD: bbpassword
      DB_NAME: bloodbank
      SECRET_KEY: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: bloodbank123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app

volumes:
  db_data:
