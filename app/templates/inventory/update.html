{% extends 'base.html' %}
{% block title %}Update Inventory — Blood Bank MS{% endblock %}

{% block content %}
<h2 class="mb-4">Update Inventory — <span class="badge bg-danger">{{ item.blood_type }}</span></h2>

<div class="card border-0 shadow-sm" style="max-width: 480px;">
    <div class="card-body">
        <p class="mb-3">Current stock: <strong>{{ item.units }} units</strong></p>
        <form action="{{ url_for('inventory.update', blood_type=item.blood_type) }}" method="post">
            <div class="mb-3">
                <label class="form-label">Action</label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="action" id="add" value="add" checked>
                        <label class="form-check-label" for="add">Add units</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="action" id="subtract" value="subtract">
                        <label class="form-check-label" for="subtract">Remove units</label>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" name="amount" id="amount" class="form-control" min="1" value="1" required>
            </div>
            <button type="submit" class="btn btn-danger">Update</button>
            <a href="{{ url_for('inventory.list_inventory') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
